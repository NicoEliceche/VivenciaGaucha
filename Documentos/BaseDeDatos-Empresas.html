<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Directorio de Contactos — Capital Federal</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0f0f13;
    --surface: #17171d;
    --surface2: #1e1e27;
    --border: rgba(255,255,255,0.07);
    --text: #f0eee8;
    --muted: #7b7988;
    --accent: #c9a96e;
    --wa: #25D366;
    --call: #ff5f5f;
    --email: #5b9cf6;
    --tag-bg: rgba(201,169,110,0.1);
    --tag-color: #c9a96e;
    --radius: 16px;
    --shadow: 0 4px 32px rgba(0,0,0,0.4);
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 48px 24px;
  }

  header {
    text-align: center;
    margin-bottom: 56px;
  }

  header h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(2rem, 5vw, 3.2rem);
    font-weight: 700;
    color: var(--text);
    letter-spacing: -0.02em;
    line-height: 1.1;
  }

  header h1 span {
    color: var(--accent);
  }

  header p {
    margin-top: 10px;
    color: var(--muted);
    font-size: 0.9rem;
    font-weight: 300;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
    gap: 20px;
    max-width: 1200px;
    margin: 0 auto;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    transition: transform 0.2s ease, box-shadow 0.2s ease, border-color 0.2s ease;
  }

  .card:hover {
    transform: translateY(-3px);
    box-shadow: var(--shadow);
    border-color: rgba(201,169,110,0.2);
  }

  .card-header {
    padding: 22px 24px 16px;
    border-bottom: 1px solid var(--border);
  }

  .card-header h2 {
    font-family: 'Playfair Display', serif;
    font-size: 1.15rem;
    font-weight: 600;
    color: var(--text);
    line-height: 1.3;
    margin-bottom: 6px;
  }

  .tipo-badge {
    display: inline-block;
    font-size: 0.7rem;
    font-weight: 500;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--tag-color);
    background: var(--tag-bg);
    border: 1px solid rgba(201,169,110,0.2);
    padding: 3px 10px;
    border-radius: 20px;
  }

  .card-body {
    padding: 16px 24px 20px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .contact-row {
    display: flex;
    align-items: center;
    gap: 10px;
    background: var(--surface2);
    border-radius: 10px;
    padding: 10px 14px;
    text-decoration: none;
    transition: background 0.15s ease, transform 0.15s ease;
    border: 1px solid transparent;
  }

  .contact-row:hover {
    transform: translateX(3px);
  }

  .contact-row.call { border-color: rgba(255,95,95,0.15); }
  .contact-row.call:hover { background: rgba(255,95,95,0.08); border-color: rgba(255,95,95,0.3); }

  .contact-row.wa { border-color: rgba(37,211,102,0.15); }
  .contact-row.wa:hover { background: rgba(37,211,102,0.08); border-color: rgba(37,211,102,0.3); }

  .contact-row.mail { border-color: rgba(91,156,246,0.15); }
  .contact-row.mail:hover { background: rgba(91,156,246,0.08); border-color: rgba(91,156,246,0.3); }

  .icon-wrap {
    width: 32px;
    height: 32px;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  .call .icon-wrap { background: rgba(255,95,95,0.15); }
  .wa .icon-wrap   { background: rgba(37,211,102,0.15); }
  .mail .icon-wrap { background: rgba(91,156,246,0.15); }

  .contact-row svg { display: block; }

  .contact-info { flex: 1; min-width: 0; }
  .contact-label {
    font-size: 0.65rem;
    font-weight: 500;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-bottom: 1px;
  }
  .call .contact-label  { color: var(--call); }
  .wa .contact-label    { color: var(--wa); }
  .mail .contact-label  { color: var(--email); }

  .contact-value {
    font-size: 0.82rem;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    font-weight: 400;
  }

  .arrow {
    color: var(--muted);
    font-size: 0.8rem;
    flex-shrink: 0;
    transition: color 0.15s ease;
  }
  .contact-row:hover .arrow { color: var(--text); }

  /* ─── PRINT STYLES ───────────────────────────────────── */
  @media print {
    /* Preservar todos los colores e imágenes de fondo exactamente */
    *, *::before, *::after {
      -webkit-print-color-adjust: exact !important;
      print-color-adjust: exact !important;
    }

    @page {
      size: A4;
      margin: 0;
    }

    body {
      padding: 6mm !important;
    }

    body {
      padding: 0;
      background: var(--bg) !important;
    }

    header {
      margin-bottom: 28px;
    }

    /* 2 columnas para aprovechar el A4 */
    .grid {
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
      max-width: 100%;
    }

    /* Tarjetas que no se cortan entre páginas */
    .card {
      break-inside: avoid;
      page-break-inside: avoid;
      overflow: visible;
    }

    /* Sin animaciones en PDF */
    .card,
    .contact-row {
      transition: none !important;
      transform: none !important;
      box-shadow: none !important;
    }

    /* Emails y teléfonos largos que no se corten */
    .contact-value {
      white-space: normal;
      overflow: visible;
      text-overflow: clip;
      word-break: break-all;
    }

    /* La flecha no aporta nada en PDF */
    .arrow { display: none; }
  }

  /* Botón de descarga — solo visible en pantalla, no en PDF */
  .download-btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    margin-top: 16px;
    padding: 10px 22px;
    background: var(--accent);
    color: #0f0f13;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.82rem;
    font-weight: 500;
    letter-spacing: 0.04em;
    border-radius: 30px;
    text-decoration: none;
    cursor: pointer;
    border: none;
    transition: opacity 0.2s ease, transform 0.2s ease;
  }
  .download-btn:hover { opacity: 0.85; transform: translateY(-1px); }

  @media print {
    .download-btn { display: none !important; }
  }
</style>
</head>
<body>

contacts.forEach(c => {

// Botón de descarga: genera el HTML como blob y lo descarga para abrir con visor nativo
document.getElementById('downloadBtn').addEventListener('click', function() {
  const html = document.documentElement.outerHTML;
  const blob = new Blob([html], { type: 'text/html' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'Directorio-Capital-Federal.html';
  a.click();
  URL.revokeObjectURL(url);
});
